components:
  responses:
    PayrollPaginatedList:
      description: Paginated payroll list
      content:
        application/json:
          schema:
            type: object
            required: [success, data, pagination]
            properties:
              success:
                type: boolean
                enum: [true]
              data:
                type: array
                items:
                  type: object
              pagination:
                $ref: "schemas/common.yaml#/PageInfo"

    EmployeePaginatedList:
      description: Paginated employee list
      content:
        application/json:
          schema:
            type: object
            required: [success, data, pagination]
            properties:
              success:
                type: boolean
                enum: [true]
              data:
                type: array
                items:
                  $ref: "schemas/employee/main.yaml#/EmployeeListItem"
              pagination:
                $ref: "schemas/common.yaml#/PageInfo"

    CommonError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "schemas/common.yaml#/ErrorResponse"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
