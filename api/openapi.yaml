            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/employee/main.yaml#/UpdateIdentityRequest"
      responses:
        "200":
          description: Identity updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/employee/main.yaml#/EmployeeResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees/{id}/contact:
    put:
      tags: [Employee]
      summary: Update employee contact info
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/employee/main.yaml#/UpdateContactRequest"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/employee/main.yaml#/EmployeeResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees/{id}/profile-photo:
    put:
      tags: [Employee]
      summary: Update employee profile photo
