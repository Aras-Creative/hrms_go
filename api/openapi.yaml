        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/payroll/setup:
    post:
      tags: [Payroll]
      summary: Setup full employee payroll package (upsert)
      description: Atomically replaces salary, compensations, benefits, and deductions for an employee. Existing assignments are replaced entirely.
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/payroll/main.yaml#/SetupEmployeePayrollRequest"
      responses:
        "200":
          description: Payroll setup complete
          content:
            application/json:
              schema:
                $ref: "schemas/common.yaml#/SuccessResponse"
        "400":
