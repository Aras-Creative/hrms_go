openapi: "3.0.3"
info:
  title: HRMS API
  version: "1.0.0"
  description: Human Resource Management System API

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/auth/register.yaml#/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "schemas/auth/register.yaml#/RegisterCreatedResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "409":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/admin/login:
    post:
      tags: [Auth]
      summary: Admin / Super login
      description: Authenticate as an admin or super user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/auth/login.yaml#/LoginAdminRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "schemas/auth/login.yaml#/LoginAdminResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "403":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchange a valid refresh token for a new token pair (rotation).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Tokens rotated successfully
          content:
            application/json:
              schema:
                $ref: "schemas/auth/refresh.yaml#/RefreshTokenResponse"
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/user/challenge:
    post:
      tags: [Auth]
      summary: Request login challenge
      description: Request a cryptographic challenge for device-bound login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/auth/user.yaml#/RequestChallengeRequest"
      responses:
        "200":
          description: Challenge generated
          content:
            application/json:
              schema:
                $ref: "schemas/auth/user.yaml#/RequestChallengeResponse"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/user/login:
    post:
      tags: [Auth]
      summary: Login with signed challenge
      description: Authenticate by signing the challenge with ECDSA P-256.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/auth/user.yaml#/UserLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "schemas/auth/user.yaml#/UserLoginResponse"
          headers:
            Set-Cookie:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "403":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "schemas/auth/register.yaml#/RegisterCreatedResponse"
        "401":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "schemas/common.yaml#/SuccessResponse"
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/designations/options:
    get:
      tags: [Designation]
      summary: List designations as autofill options
      responses:
        "200":
          description: Options list
          content:
            application/json:
              schema:
                $ref: "schemas/designation/main.yaml#/OptionsResponse"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/designations:
    get:
      tags: [Designation]
      summary: List all designations
      responses:
        "200":
          description: Designation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: "schemas/designation/main.yaml#/DesignationResponse"
        "500":
          $ref: "#/components/responses/CommonError"

    post:
      tags: [Designation]
      summary: Create a designation
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/designation/main.yaml#/DesignationCreateRequest"
      responses:
        "201":
          description: Designation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/designation/main.yaml#/DesignationResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/designations/{id}:
    get:
      tags: [Designation]
      summary: Get a designation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Designation found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/designation/main.yaml#/DesignationResponse"
        "404":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

    put:
      tags: [Designation]
      summary: Update a designation
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/designation/main.yaml#/DesignationUpdateRequest"
      responses:
        "200":
          description: Designation updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/designation/main.yaml#/DesignationResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

    delete:
      tags: [Designation]
      summary: Delete a designation
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Designation deleted
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees:
    get:
      tags: [Employee]
      summary: List employees
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
          description: Search by full name (case-insensitive partial match)
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, expired_contract, pending_contract]
          description: Filter by employment status
        - name: designation_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by designation
      responses:
        "200":
          description: Paginated employee list
          content:
            application/json:
              schema:
                $ref: "#/components/responses/EmployeePaginatedList"
        "500":
          $ref: "#/components/responses/CommonError"

    post:
      tags: [Employee]
      summary: Create an employee
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "schemas/employee/main.yaml#/CreateRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/employee/main.yaml#/EmployeeResponse"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees/me:
    get:
      tags: [Employee]
      summary: Get my employee profile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Employee profile linked to authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/employee/main.yaml#/EmployeeResponse"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees/peek-next-number:
    get:
      tags: [Employee]
      summary: Peek next available employee number for a designation
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: designation_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Next employee number
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      employee_number:
                        type: string
                        example: "1001SWE02"
        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/employees/{id}:
    get:
      tags: [Employee]
      summary: Get an employee by ID
      parameters:
