          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Employee found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "schemas/employee/main.yaml#/EmployeeResponse"
        "404":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

