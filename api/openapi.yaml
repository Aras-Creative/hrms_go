        "400":
          $ref: "#/components/responses/CommonError"
        "401":
          $ref: "#/components/responses/CommonError"
        "404":
          $ref: "#/components/responses/CommonError"
        "422":
          $ref: "#/components/responses/CommonError"
        "500":
          $ref: "#/components/responses/CommonError"

  /api/v1/payroll/salary/{id}:
