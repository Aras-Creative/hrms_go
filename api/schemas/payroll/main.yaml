# =============================================================================
# Payroll module schemas
# =============================================================================

BaseSalaryResponse:
  type: object
  required:
    - id
    - employee_id
    - amount
    - currency
    - effective_date
    - notes
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    employee_id:
      type: string
      format: uuid
    amount:
      type: number
      format: float
      description: Base salary amount
    currency:
      type: string
      description: ISO 4217 currency code
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true

# ---------------------------------------------------------------------------
# Setup (bulk upsert)
# ---------------------------------------------------------------------------

SetupEmployeePayrollBaseSalary:
  type: object
  properties:
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      default: IDR
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true
    notes:
      type: string

SetupEmployeePayrollItem:
  type: object
  properties:
    compensation_item_id:
      type: string
      format: uuid
    benefit_type_id:
      type: string
      format: uuid
    deduction_type_id:
      type: string
      format: uuid
    participant_number:
      type: string
    amount:
      type: number
      minimum: 0
    frequency:
      type: string
      enum: [monthly, yearly, one_time]
    value:
      type: number
      nullable: true
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true

SetupEmployeePayrollRequest:
  type: object
  required:
    - employee_id
  properties:
    employee_id:
      type: string
      format: uuid
    base_salary:
      $ref: "#/SetupEmployeePayrollBaseSalary"
    compensations:
      type: array
      items:
        $ref: "#/SetupEmployeePayrollItem"
    benefits:
      type: array
      items:
        $ref: "#/SetupEmployeePayrollItem"
    deductions:
      type: array
      items:
        $ref: "#/SetupEmployeePayrollItem"
      description: Null if currently active
    notes:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateBaseSalaryRequest:
  type: object
  required:
    - employee_id
    - amount
    - effective_date
  properties:
    employee_id:
      type: string
      format: uuid
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      default: IDR
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true
    notes:
      type: string

UpdateBaseSalaryRequest:
  type: object
  required:
    - amount
    - effective_date
  properties:
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      default: IDR
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true
    notes:
      type: string

# ---------------------------------------------------------------------------
# Compensation Items
# ---------------------------------------------------------------------------

CompensationItemResponse:
  type: object
  required:
    - id
    - name
    - item_type
    - is_active
    - is_taxable
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    item_type:
      type: string
      enum: [recurring, one_time]
    description:
      type: string
    is_active:
      type: boolean
    is_taxable:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateCompensationItemRequest:
  type: object
  required:
    - name
    - item_type
  properties:
    name:
      type: string
      maxLength: 255
    item_type:
      type: string
      enum: [recurring, one_time]
    description:
      type: string
    is_taxable:
      type: boolean
      default: true

UpdateCompensationItemRequest:
  type: object
  required:
    - name
    - item_type
  properties:
    name:
      type: string
      maxLength: 255
    item_type:
      type: string
      enum: [recurring, one_time]
    description:
      type: string
    is_active:
      type: boolean
    is_taxable:
      type: boolean

