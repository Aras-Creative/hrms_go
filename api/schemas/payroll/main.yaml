# ---------------------------------------------------------------------------
# Deduction Types
# ---------------------------------------------------------------------------

DeductionTypeResponse:
  type: object
  required:
    - id
    - name
    - slug
    - deduction_type
    - default_value
    - is_active
    - is_mandatory
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    slug:
      type: string
    description:
      type: string
    deduction_type:
      type: string
      enum: [percentage, fixed]
    default_value:
      type: number
      format: float
    is_active:
      type: boolean
    is_mandatory:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateDeductionTypeRequest:
  type: object
  required:
    - name
    - deduction_type
    - default_value
  properties:
    name:
      type: string
      maxLength: 255
    description:
      type: string
    deduction_type:
      type: string
      enum: [percentage, fixed]
    default_value:
      type: number
      minimum: 0
    is_mandatory:
      type: boolean
      default: false

UpdateDeductionTypeRequest:
  type: object
  required:
    - name
    - deduction_type
    - default_value
  properties:
    name:
      type: string
      maxLength: 255
    description:
      type: string
    deduction_type:
      type: string
      enum: [percentage, fixed]
    default_value:
      type: number
      minimum: 0
    is_active:
      type: boolean
    is_mandatory:
      type: boolean

# ---------------------------------------------------------------------------
# Employee Deductions
# ---------------------------------------------------------------------------

EmployeeDeductionResponse:
  type: object
  required:
    - id
    - employee_id
    - deduction_type_id
    - effective_date
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    employee_id:
      type: string
      format: uuid
    deduction_type_id:
      type: string
      format: uuid
    value:
      type: number
      format: float
      nullable: true
      description: Null if using default from deduction_type
    effective_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

# ---------------------------------------------------------------------------
# Payroll Periods
# ---------------------------------------------------------------------------

PayrollPeriodResponse:
  type: object
  required:
    - id
    - name
    - start_date
    - end_date
    - status
    - working_days
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
    status:
      type: string
      enum: [draft, closed]
    working_days:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreatePeriodRequest:
  type: object
  required:
    - name
    - start_date
    - end_date
    - working_days
  properties:
    name:
      type: string
      maxLength: 255
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
    working_days:
      type: integer
      minimum: 1

UpdatePeriodRequest:
  type: object
  required:
    - name
    - start_date
    - end_date
    - working_days
  properties:
    name:
      type: string
      maxLength: 255
    start_date:
      type: string
      format: date
    end_date:
      type: string
      format: date
    working_days:
      type: integer
      minimum: 1

# ---------------------------------------------------------------------------
# Pay Slips
# ---------------------------------------------------------------------------

PaySlipResponse:
  type: object
  required:
    - id
    - period_id
    - employee_id
    - base_salary
    - total_compensations
    - total_deductions
    - absent_deduction
    - absent_days
    - net_salary
    - currency
    - compensations_breakdown
    - deductions_breakdown
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    period_id:
      type: string
      format: uuid
    employee_id:
      type: string
      format: uuid
    base_salary:
      type: number
      format: float
    total_compensations:
      type: number
      format: float
    total_deductions:
      type: number
      format: float
    absent_deduction:
      type: number
      format: float
    absent_days:
      type: integer
    net_salary:
      type: number
      format: float
    currency:
      type: string
    compensations_breakdown:
      type: array
      items:
        $ref: "#/BreakdownItem"
    deductions_breakdown:
      type: array
      items:
        $ref: "#/BreakdownItem"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

BreakdownItem:
  type: object
  properties:
    compensation_item_id:
      type: string
      format: uuid
    deduction_type_id:
      type: string
      format: uuid
    name:
      type: string
    amount:
      type: number
      format: float

# (end of schemas)

# ---------------------------------------------------------------------------
# Period Overview
# ---------------------------------------------------------------------------

PeriodOverviewEmployee:
  type: object
  required:
    - employee_id
    - employee_name
    - employee_number
    - absent_days
    - late_minutes
  properties:
    employee_id:
      type: string
      format: uuid
    employee_name:
      type: string
    employee_number:
      type: string
    designation_name:
      type: string
      nullable: true
    profile_photo_id:
      type: string
      format: uuid
      nullable: true
    base_salary:
      $ref: "#/BaseSalaryResponse"
    compensations:
      type: array
      items:
        $ref: "#/EmployeeCompensationResponse"
    benefits:
      type: array
      items:
        $ref: "#/EmployeeBenefitResponse"
    deductions:
      type: array
      items:
        $ref: "#/EmployeeDeductionResponse"
    absent_days:
      type: integer
    late_minutes:
      type: integer
      items:
        $ref: "#/EmployeeDeductionResponse"
    absent_days:
      type: integer
