# =============================================================================
# Auth module: Register endpoint schemas
# =============================================================================
RegisterRequest:
  type: object
  required: [full_name, role, username, password]
  properties:
    full_name:
      type: string
      minLength: 3
      maxLength: 100
      description: User's full display name
      example: Santi Hopipah
    role:
      type: string
      enum: [user, admin, super]
      description: User role
      example: admin
    username:
      type: string
      maxLength: 255
      description: Login identifier (email)
      example: admin@admin.com
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: Account password
      example: 0p9o8i&U

RegisterCreatedResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: "#/UserResponse"
  example:
    success: true
    data:
      id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      full_name: Santi Hopipah
      username: admin@admin.com
      role: admin
      is_active: true
      created_at: "2026-07-01T14:24:22+07:00"
      updated_at: "2026-07-01T14:24:22+07:00"

UserResponse:
  type: object
  required: [id, full_name, username, role, is_active, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
      description: Unique user identifier
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    full_name:
      type: string
      description: User's full display name
      example: Santi Hopipah
    username:
      type: string
      description: Login identifier (email)
      example: admin@admin.com
    role:
      type: string
      enum: [user, admin, super]
      description: User role
      example: admin
    is_active:
      type: boolean
      description: Whether the user account is active
      example: true
    created_at:
      type: string
      format: date-time
      description: Account creation timestamp
      example: "2026-07-01T14:24:22+07:00"
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp
      example: "2026-07-01T14:24:22+07:00"
