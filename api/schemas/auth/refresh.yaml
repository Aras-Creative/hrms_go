# =============================================================================
# Auth module: Refresh Token endpoint schemas
# =============================================================================

RefreshTokenResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: "login.yaml#/LoginAdminData"
  example:
    success: true
    data:
      access_token: eyJhbGciOiJIUzI1NiIs...
      refresh_token: a1b2c3d4e5f6...abcdef
      user:
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        full_name: Santi Hopipah
        username: admin@admin.com
        role: admin
        is_active: true
        created_at: "2026-07-01T14:24:22+07:00"
        updated_at: "2026-07-01T14:24:22+07:00"
