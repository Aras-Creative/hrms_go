# =============================================================================
# Auth module: LoginAdmin endpoint schemas
# =============================================================================

LoginAdminRequest:
  type: object
  required: [username, password]
  properties:
    username:
      type: string
      maxLength: 255
      description: Admin/super username (email)
      example: admin@admin.com
    password:
      type: string
      description: Account password
      example: Str0ng!Pass

LoginAdminResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: "#/LoginAdminData"
  example:
    success: true
    data:
      access_token: eyJhbGciOiJIUzI1NiIs...
      refresh_token: a1b2c3d4e5f6...abcdef
      user:
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        full_name: Santi Hopipah
        username: admin@admin.com
        role: admin
        is_active: true
        created_at: "2026-07-01T14:24:22+07:00"
        updated_at: "2026-07-01T14:24:22+07:00"

LoginAdminData:
  type: object
  required: [access_token, refresh_token, user]
  properties:
    access_token:
      type: string
      description: JWT access token for API authorization
      example: eyJhbGciOiJIUzI1NiIs...
    refresh_token:
      type: string
      description: Refresh token for obtaining a new access token
      example: a1b2c3d4e5f6...abcdef
    user:
      $ref: "register.yaml#/UserResponse"
