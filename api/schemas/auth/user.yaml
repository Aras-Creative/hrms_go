# =============================================================================
# Auth module: Device-bound user login (challenge / login) schemas
# =============================================================================

RequestChallengeRequest:
  type: object
  required: [username]
  properties:
    username:
      type: string
      maxLength: 255
      description: User email / login identifier
      example: user@example.com

RequestChallengeResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: "#/ChallengeData"
  example:
    success: true
    data:
      challenge_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      challenge: 4a2f8b3c1d9e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f
      expires_at: "2026-07-01T15:30:00+07:00"

ChallengeData:
  type: object
  required: [challenge_id, challenge, expires_at]
  properties:
    challenge_id:
      type: string
      format: uuid
      description: Unique challenge identifier (single-use)
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    challenge:
      type: string
      description: Random 64 hex chars to be signed with ECDSA P-256 private key
      example: 4a2f8b3c1d9e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f
    expires_at:
      type: string
      format: date-time
      description: Challenge expiry timestamp
      example: "2026-07-01T15:30:00+07:00"

UserLoginRequest:
  type: object
  required: [username, challenge_id, challenge, signature, public_key, device]
  properties:
    username:
      type: string
      maxLength: 255
      description: User email / login identifier
      example: user@example.com
    challenge_id:
      type: string
      format: uuid
      description: Challenge ID from the previous step
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    challenge:
      type: string
      description: The raw challenge plaintext from Step 1
      example: 4a2f8b3c1d9e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f
    signature:
      type: string
      description: >
        Base64-encoded ECDSA P-256 signature over the challenge bytes
      example: MEQCIH0xL3...
    public_key:
      type: string
      description: >
        Base64-encoded ECDSA P-256 public key (X || Y bytes, uncompressed).
        Required on first login to bind the device; ignored on subsequent logins.
      example: BF8R...
    device:
      $ref: "#/DeviceInfo"

DeviceInfo:
  type: object
  required: [name, platform]
  properties:
    name:
      type: string
      description: Human-readable device name
      example: Pixel 9
    platform:
      type: string
      description: Device platform / OS
      example: Android

UserLoginResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: "../auth/login.yaml#/LoginAdminData"
  example:
    success: true
    data:
      access_token: eyJhbGciOiJIUzI1NiIs...
      refresh_token: a1b2c3d4e5f6...abcdef
      user:
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        full_name: User Person
        username: user@example.com
        role: user
        is_active: true
        created_at: "2026-07-01T14:24:22+07:00"
        updated_at: "2026-07-01T14:24:22+07:00"
