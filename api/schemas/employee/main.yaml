UpdateContactRequest:
  type: object
  required:
    - phone
    - emergency_contact_name
    - emergency_contact_phone
  properties:
    phone:
      type: string
    personal_email:
      type: string
      format: email
    emergency_contact_name:
      type: string
    emergency_contact_phone:
      type: string

UpdateProfilePhotoRequest:
  type: object
  properties:
    profile_photo_id:
      type: string
      format: uuid
      nullable: true
